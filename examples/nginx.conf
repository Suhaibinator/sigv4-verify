http {
    proxy_cache_path /var/cache/nginx/s3
        levels=1:2
        keys_zone=s3_assets:10m
        max_size=10g
        inactive=60m
        use_temp_path=off;

    upstream sigv4_verify {
        server 127.0.0.1:8080;
        # For Unix socket transport, use this server line instead:
        # server unix:/run/sigv4-verify/sigv4-verify.sock;
        keepalive 32;
    }

    upstream minio_origin {
        server minio:9000;
        keepalive 32;
    }

    server {
        listen 443 ssl http2;
        server_name assets.example.com;

        location = /_verify_sigv4 {
            internal;

            proxy_pass http://sigv4_verify/verify;
            proxy_method GET;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Host $host;
            proxy_set_header X-Original-Scheme $scheme;

            proxy_connect_timeout 100ms;
            proxy_send_timeout 250ms;
            proxy_read_timeout 250ms;
        }

        location / {
            auth_request /_verify_sigv4;

            proxy_pass http://minio_origin;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Keep Host aligned with the public host used when the URL was signed.
            proxy_set_header Host $host;

            proxy_cache s3_assets;
            proxy_cache_methods GET HEAD;
            # Keep the complete signed query in the cache identity. S3 response
            # parameters can select a different representation for the same path.
            proxy_cache_key "$scheme://$host$request_uri";
            proxy_cache_valid 200 206 10m;

            proxy_connect_timeout 1s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
        }
    }
}
